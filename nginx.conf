# ==============================================================================
# Configuration Nginx — holotuto.com
# Utilisé par : nginxinc/nginx-unprivileged (écoute sur 8080, non-root)
# ==============================================================================

# Serveur principal — sert holotuto.com ET www.holotuto.com
# (default_server : capture aussi localhost lors des healthchecks Docker / tests CI)
server {
    listen 8080 default_server;
    listen [::]:8080 default_server;
    server_name holotuto.com www.holotuto.com;

    root /usr/share/nginx/html;
    index index.html;

    # --------------------------------------------------------------------------
    # Compression gzip
    # --------------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # --------------------------------------------------------------------------
    # En-têtes de sécurité (appliqués globalement)
    # --------------------------------------------------------------------------
    add_header X-Frame-Options            "SAMEORIGIN"                       always;
    add_header X-Content-Type-Options     "nosniff"                          always;
    add_header X-XSS-Protection           "1; mode=block"                   always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy
        "default-src 'self' https://holotuto.com https://www.holotuto.com;
         script-src  'self' 'unsafe-inline' https://assets.calendly.com;
         style-src   'self' 'unsafe-inline' https://fonts.googleapis.com https://assets.calendly.com;
         font-src    'self' https://fonts.gstatic.com;
         img-src     'self' data: https://images.unsplash.com https://calendly.com;
         connect-src 'self' https://calendly.com https://api.calendly.com;
         frame-src   https://calendly.com;
         frame-ancestors 'none';"
        always;

    # --------------------------------------------------------------------------
    # Cache — assets Vite (hash dans le nom de fichier → immuables)
    # --------------------------------------------------------------------------
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Cache 30 jours pour images, fonts et icônes hors /assets/
    location ~* \.(png|jpg|jpeg|gif|svg|ico|webp|woff|woff2|ttf|otf)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # --------------------------------------------------------------------------
    # SPA fallback — toutes les routes renvoient index.html
    # --------------------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --------------------------------------------------------------------------
    # Healthcheck endpoint (utilisé par Docker et le load-balancer)
    # --------------------------------------------------------------------------
    location /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Bloquer les tentatives d'accès aux fichiers cachés (.env, .git, etc.)
    location ~ /\. {
        deny all;
        access_log off;
    }
}
